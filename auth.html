<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЛЕТИМ | Вход и регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #cfe9ff 0%, #b0d4ff 50%, #9ac8ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        body::before {
            content: "☁️";
            position: absolute;
            font-size: 120px;
            opacity: 0.15;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        body::after {
            content: "☁️";
            position: absolute;
            font-size: 160px;
            opacity: 0.12;
            bottom: 20px;
            right: 20px;
            pointer-events: none;
            transform: scaleX(-1);
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 40px;
            padding: 2rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 45px rgba(0, 40, 80, 0.2), 0 0 0 1px rgba(66, 192, 232, 0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header img {
            height: 60px;
        }

        .auth-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: #eef5fc;
            border-radius: 60px;
            padding: 5px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.7rem 0;
            font-size: 1rem;
            font-weight: 600;
            color: #4f7a9e;
            cursor: pointer;
            transition: all 0.25s;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
        }

        .tab-btn:hover {
            color: #1c8ab3;
        }

        .tab-btn.active {
            background: white;
            color: #1c7da5;
            box-shadow: 0 4px 12px rgba(0, 110, 150, 0.12);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeSlideUp 0.35s ease-out;
        }

        .form-group {
            margin-bottom: 1.3rem;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #2a6c8f;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            border: 1.5px solid #dcf0ff;
            border-radius: 28px;
            font-size: 0.95rem;
            transition: all 0.25s;
            background: #ffffff;
            font-family: 'Inter', sans-serif;
            outline: none;
            color: #1f3e54;
        }

        .form-group input:focus {
            border-color: #5bc0ff;
            box-shadow: 0 0 0 4px rgba(91, 192, 255, 0.2);
        }

        .form-group input.error {
            border-color: #ff8a7a;
        }

        .error-message {
            color: #e06c5e;
            font-size: 0.7rem;
            margin-top: 0.4rem;
            margin-left: 0.8rem;
            display: none;
            font-weight: 500;
        }

        .error-message.show {
            display: block;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(100deg, #3bb3df, #1f9ad0);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.6rem;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 6px 14px rgba(35, 150, 200, 0.3);
        }

        .btn-submit:hover {
            background: linear-gradient(100deg, #2da1cb, #0e88bb);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(31, 147, 191, 0.35);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.6rem;
            color: #5a7f9a;
            font-size: 0.85rem;
        }

        .auth-footer a {
            color: #2d93bc;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px dashed #b9dcf5;
        }

        .auth-footer a:hover {
            color: #136f96;
            border-bottom-color: #2d93bc;
        }

        .back-link {
            text-align: center;
            margin-top: 1.8rem;
        }

        .back-link a {
            color: #5683a2;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.2s;
            font-weight: 450;
        }

        .back-link a:hover {
            color: #277c9e;
            text-decoration: underline;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input::placeholder {
            color: #bbd1e2;
            font-weight: 400;
            font-size: 0.85rem;
        }

        @media (max-width: 500px) {
            .auth-container {
                padding: 1.5rem;
            }
        }

        .server-status {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #7a9cba;
            cursor: pointer;
            padding: 5px;
        }

        .server-status.error {
            color: #e06c5e;
        }

        .server-status.success {
            color: #2d93bc;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <img src="/image/logo.png" alt="ЛЕТИМ" onerror="this.src='https://via.placeholder.com/60x60?text=ЛЕТИМ'">
        </div>

       
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Вход</button>
            <button class="tab-btn" onclick="switchTab('register')">Регистрация</button>
        </div>

        <!-- Форма входа -->
        <div id="loginForm" class="auth-form active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="test@test.com" autocomplete="username">
                    <div class="error-message" id="loginEmailError"></div>
                </div>

                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
                    <div class="error-message" id="loginPasswordError"></div>
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">Войти в кабинет</button>
            </form>

            <div class="auth-footer">
                Ещё не с нами? <a href="#" onclick="switchTab('register')">Создать аккаунт</a>
            </div>
        </div>

        <!-- Форма регистрации -->
        <div id="registerForm" class="auth-form">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Имя и фамилия</label>
                    <input type="text" id="regFullName" placeholder="Алёна Соколова" autocomplete="name">
                    <div class="error-message" id="regNameError"></div>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="alena@example.ru" autocomplete="email">
                    <div class="error-message" id="regEmailError"></div>
                </div>

                <div class="form-group">
                    <label>Телефон</label>
                    <input type="tel" id="regPhone" placeholder="+7 (900) 123-45-67" autocomplete="tel">
                    <div class="error-message" id="regPhoneError"></div>
                </div>

                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="минимум 6 символов" autocomplete="new-password">
                    <div class="error-message" id="regPasswordError"></div>
                </div>

                <div class="form-group">
                    <label>Подтверждение пароля</label>
                    <input type="password" id="regConfirmPassword" placeholder="повторите пароль" autocomplete="off">
                    <div class="error-message" id="regConfirmError"></div>
                </div>

                <button type="submit" class="btn-submit" id="registerBtn">Зарегистрироваться</button>
            </form>

            <div class="auth-footer">
                Уже есть профиль? <a href="#" onclick="switchTab('login')">Войти</a>
            </div>
        </div>

        <div class="back-link">
            <a href="/">← На главную</a>
        </div>
        
        <div class="server-status" id="serverStatus" onclick="checkServerConnection()">
            🔌 Проверить подключение к серверу
        </div>
    </div>

    <script>
        // API URL - изменено на порт 3003
        const API_URL = 'http://localhost:3003/api';
        
        // Флаг для отслеживания состояния загрузки
        let isProcessing = false;

        // Данные администратора для быстрого входа
        const ADMIN_CREDENTIALS = {
            email: 'admin@letim.ru',
            password: 'admin123'
        };

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabs = document.querySelectorAll('.tab-btn');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
            
            clearAllErrors();
        }

        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function validatePhone(phone) {
            const digits = phone.replace(/\D/g, '');
            return digits.length >= 10 && digits.length <= 12;
        }

        function showError(elementId, message) {
            const errorDiv = document.getElementById(elementId);
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.add('show');
                const input = errorDiv.closest('.form-group')?.querySelector('input');
                if (input) input.classList.add('error');
            }
        }

        function hideError(elementId) {
            const errorDiv = document.getElementById(elementId);
            if (errorDiv) {
                errorDiv.classList.remove('show');
                const input = errorDiv.closest('.form-group')?.querySelector('input');
                if (input) input.classList.remove('error');
            }
        }

        function clearAllErrors() {
            const errorIds = [
                'loginEmailError', 'loginPasswordError',
                'regNameError', 'regEmailError', 'regPhoneError', 
                'regPasswordError', 'regConfirmError'
            ];
            errorIds.forEach(id => hideError(id));
        }

        function showNotification(message, isSuccess = true) {
            const notification = document.createElement('div');
            const bgColor = isSuccess ? '#2096c9' : '#e28c7a';
            notification.style.cssText = `
                position: fixed;
                top: 24px;
                right: 24px;
                background: ${bgColor};
                color: white;
                padding: 12px 22px;
                border-radius: 60px;
                font-weight: 500;
                z-index: 10000;
                animation: fadeSlideUp 0.2s ease;
                box-shadow: 0 8px 20px rgba(0, 70, 100, 0.2);
                font-size: 0.9rem;
            `;
            notification.innerText = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        function setButtonLoading(btn, loading) {
            if (loading) {
                btn.disabled = true;
                const originalText = btn.innerHTML;
                btn.setAttribute('data-original-text', originalText);
                btn.innerHTML = '<span class="loading-spinner"></span> Загрузка...';
            } else {
                btn.disabled = false;
                const originalText = btn.getAttribute('data-original-text');
                if (originalText) {
                    btn.innerHTML = originalText;
                } else {
                    btn.innerHTML = btn.id === 'loginBtn' ? 'Войти в кабинет' : 'Зарегистрироваться';
                }
            }
        }

        async function checkServerConnection() {
            const statusDiv = document.getElementById('serverStatus');
            statusDiv.textContent = '🔄 Проверка подключения...';
            statusDiv.classList.remove('error', 'success');
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(`${API_URL}/auth/me`, {
                    method: 'GET',
                    credentials: 'include',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    statusDiv.innerHTML = '✅ Сервер доступен (порт 3003)';
                    statusDiv.classList.add('success');
                    console.log('✅ Сервер успешно отвечает на порту 3003');
                    showNotification('Сервер доступен!', true);
                } else {
                    statusDiv.innerHTML = '⚠️ Сервер отвечает, но требуется авторизация';
                    statusDiv.classList.add('error');
                }
            } catch (error) {
                console.error('❌ Ошибка подключения к серверу:', error);
                statusDiv.innerHTML = '❌ Сервер недоступен. Запустите сервер на порту 3003';
                statusDiv.classList.add('error');
                showNotification('Сервер не отвечает. Запустите сервер на порту 3003', false);
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            if (isProcessing) return;
            
            clearAllErrors();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');

            let isValid = true;

            if (!email) {
                showError('loginEmailError', 'Введите email');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('loginEmailError', 'Введите корректный email');
                isValid = false;
            }

            if (!password) {
                showError('loginPasswordError', 'Введите пароль');
                isValid = false;
            } else if (password.length < 6) {
                showError('loginPasswordError', 'Пароль должен быть не менее 6 символов');
                isValid = false;
            }

            if (!isValid) return;

            isProcessing = true;
            setButtonLoading(loginBtn, true);

            try {
                console.log('🔐 Попытка входа:', email);
                
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('📡 Ответ сервера:', data);

                if (response.ok) {
                    if (data.user) {
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                        console.log('✅ Пользователь сохранен:', data.user);
                        
                        // Показываем приветствие с ролью
                        const roleText = data.user.role === 'admin' ? ' (Администратор)' : '';
                        showNotification(`✨ Добро пожаловать, ${data.user.name}${roleText}!`, true);
                    }
                    
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showError('loginEmailError', data.error || 'Неверный email или пароль');
                    console.error('❌ Ошибка входа:', data.error);
                }
            } catch (error) {
                console.error('❌ Ошибка соединения:', error);
                showError('loginEmailError', `Ошибка: ${error.message}. Сервер должен быть запущен на порту 3003`);
                showNotification('Не удалось соединиться с сервером на порту 3003', false);
                checkServerConnection();
            } finally {
                isProcessing = false;
                setButtonLoading(loginBtn, false);
            }
        }

        async function handleRegister(event) {
            event.preventDefault();
            
            if (isProcessing) return;
            
            clearAllErrors();

            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');

            let isValid = true;

            if (!fullName) {
                showError('regNameError', 'Укажите имя и фамилию');
                isValid = false;
            } else if (fullName.length < 3) {
                showError('regNameError', 'Минимум 3 символа');
                isValid = false;
            }

            if (!email) {
                showError('regEmailError', 'Введите email');
                isValid = false;
            } else if (!validateEmail(email)) {
                showError('regEmailError', 'Формат: name@domain.ru');
                isValid = false;
            }

            if (!phone) {
                showError('regPhoneError', 'Номер телефона обязателен');
                isValid = false;
            } else if (!validatePhone(phone)) {
                showError('regPhoneError', 'Введите корректный номер (от 10 цифр)');
                isValid = false;
            }

            if (!password) {
                showError('regPasswordError', 'Придумайте пароль');
                isValid = false;
            } else if (password.length < 6) {
                showError('regPasswordError', 'Пароль должен быть не менее 6 символов');
                isValid = false;
            }

            if (password !== confirmPassword) {
                showError('regConfirmError', 'Пароли не совпадают');
                isValid = false;
            }

            if (!isValid) return;

            isProcessing = true;
            setButtonLoading(registerBtn, true);

            try {
                console.log('📝 Регистрация нового пользователя:', email);
                
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        name: fullName, 
                        email, 
                        phone, 
                        password 
                    })
                });

                const data = await response.json();
                console.log('📡 Ответ сервера:', data);

                if (response.ok) {
                    showNotification('🎉 Регистрация успешна! Теперь войдите.', true);
                    
                    switchTab('login');
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = '';
                    
                    document.getElementById('regFullName').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPhone').value = '';
                    document.getElementById('regPassword').value = '';
                    document.getElementById('regConfirmPassword').value = '';
                } else {
                    showError('regEmailError', data.error || 'Ошибка регистрации. Возможно, email уже используется.');
                    console.error('❌ Ошибка регистрации:', data.error);
                }
            } catch (error) {
                console.error('❌ Ошибка соединения:', error);
                showError('regEmailError', `Ошибка: ${error.message}. Сервер должен быть запущен на порту 3003`);
                showNotification('Не удалось соединиться с сервером на порту 3003', false);
                checkServerConnection();
            } finally {
                isProcessing = false;
                setButtonLoading(registerBtn, false);
            }
        }

        async function checkAuth() {
            try {
                console.log('🔍 Проверка авторизации...');
                const response = await fetch(`${API_URL}/auth/me`, {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.user) {
                        console.log('✅ Пользователь уже авторизован:', data.user.email);
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                        window.location.href = '/';
                    } else {
                        console.log('ℹ️ Пользователь не авторизован');
                        localStorage.removeItem('currentUser');
                    }
                }
            } catch (error) {
                console.error('❌ Ошибка проверки авторизации:', error);
                localStorage.removeItem('currentUser');
            }
        }

        // Автоматическая проверка подключения при загрузке
        setTimeout(() => {
            checkServerConnection();
        }, 1000);

        console.log('🎯 Страница авторизации загружена');
        console.log('📡 API URL:', API_URL);
        console.log('💡 Тестовый пользователь: test@test.com / 123456');
        console.log('👑 Администратор: admin@letim.ru / admin123');
        console.log('💡 Или зарегистрируйте нового пользователя');
        
        checkAuth();
    </script>
</body>
</html>
